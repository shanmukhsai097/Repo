services:
  - type: web
    name: resto-pro
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: resto-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
      - key: DATA_FILE
        value: /var/data/resto-data.json
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: OCR_ENABLED
        value: true
