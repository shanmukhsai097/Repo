<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RESTO PRO v3.0</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0e0f14;--bg2:#13141b;--bg3:#1a1b24;--bg4:#22232f;--bg5:#2a2b38;
  --border:#2a2b38;--border2:#363748;
  --text:#e4e5f0;--text2:#8b8ca8;--text3:#4a4b62;
  --accent:#f5a623;--accent2:#ffc15e;
  --green:#00d97e;--blue:#3b82f6;--purple:#8b5cf6;--red:#f43f5e;--yellow:#fbbf24;--cyan:#06b6d4;
  --sidebar-w:210px;--r:8px;--r-sm:5px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;}
.mono{font-family:'JetBrains Mono',monospace;}
#app{display:none;width:100%;height:100vh;overflow:hidden;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;gap:28px;flex-wrap:wrap;padding:24px;}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px;width:380px;}
.login-brand{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:4px;}
.login-brand span{color:var(--accent);}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:24px;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.7px;}
.lf input,.lf select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);padding:10px 12px;font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border .15s;}
.lf input:focus,.lf select:focus{border-color:var(--accent);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:38px;}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text2);font-size:15px;background:none;border:none;}
.login-btn{width:100%;background:var(--accent);color:#0e0f14;border:none;border-radius:var(--r-sm);padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;margin-top:4px;transition:all .15s;}
.login-btn:hover{background:var(--accent2);}
.login-err{color:var(--red);font-size:12px;margin-top:8px;display:none;}

.creds-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:340px;max-height:480px;overflow-y:auto;}
.creds-title{font-size:12px;font-weight:700;margin-bottom:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;}
.cred-row{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;background:var(--bg3);border-radius:var(--r-sm);margin-bottom:6px;cursor:pointer;transition:all .12s;border:1px solid transparent;}
.cred-row:hover{border-color:var(--accent);background:rgba(245,166,35,.06);}
.cred-role{font-size:12px;font-weight:700;}
.cred-info{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.cred-pw{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--accent);}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100vh;}
.sb-header{padding:16px 14px 12px;}
.sb-brand{font-size:20px;font-weight:800;letter-spacing:-1px;}
.sb-brand span{color:var(--accent);}
.sb-version{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px;}
.sb-user{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:var(--r-sm);padding:8px 10px;margin-top:8px;}
.sb-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:600;line-height:1.2;}
.sb-urole{font-size:10px;color:var(--text2);}
.sb-nav{flex:1;overflow-y:auto;padding:8px;}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.2px;padding:10px 6px 4px;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px;border-radius:var(--r-sm);cursor:pointer;color:var(--text2);font-size:12.5px;font-weight:500;transition:all .12s;}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:rgba(245,166,35,.12);color:var(--accent);}
.sb-item .si{width:18px;text-align:center;font-size:14px;}
.sb-badge{margin-left:auto;background:var(--accent);color:#0e0f14;font-size:9px;font-weight:700;padding:2px 5px;border-radius:99px;min-width:16px;text-align:center;}
.sb-footer{padding:10px 8px;border-top:1px solid var(--border);}
.sb-status{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:4px 6px;line-height:1.7;}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh;}
#topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:700;flex:1;}
.tb-lang select{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);padding:5px 10px;font-size:12px;font-family:'Outfit',sans-serif;outline:none;cursor:pointer;}
.tb-clock{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);}
.tb-online{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:99px;border:1px solid rgba(0,217,126,.3);color:var(--green);background:rgba(0,217,126,.08);font-weight:600;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
#content{flex:1;overflow-y:auto;padding:20px;}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:18px;font-weight:700;}
.section-sub{font-size:12px;color:var(--text2);}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:14px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;border-left:3px solid var(--border2);}
.stat-card.c-orange{border-left-color:var(--accent);}
.stat-card.c-green{border-left-color:var(--green);}
.stat-card.c-blue{border-left-color:var(--blue);}
.stat-card.c-purple{border-left-color:var(--purple);}
.stat-card.c-red{border-left-color:var(--red);}
.stat-card.c-cyan{border-left-color:var(--cyan);}
.stat-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;}
.stat-val{font-size:22px;font-weight:800;margin:4px 0 2px;font-family:'JetBrains Mono',monospace;}
.stat-note{font-size:11px;color:var(--text2);}

/* QA GRID */
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.qa-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .15s;text-align:center;}
.qa-card:hover{border-color:var(--accent);background:rgba(245,166,35,.06);transform:translateY(-1px);}
.qa-icon{font-size:26px;margin-bottom:8px;}
.qa-name{font-size:12.5px;font-weight:700;}
.qa-sub{font-size:10px;color:var(--text2);margin-top:2px;}

/* TABLES */
.tables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:10px;}
.tbl-card{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .15s;text-align:center;position:relative;}
.tbl-card:hover{transform:translateY(-1px);}
.tbl-card.free{border-color:rgba(0,217,126,.35);}
.tbl-card.occupied{border-color:rgba(245,166,35,.5);background:rgba(245,166,35,.04);}
.tbl-card.reserved{border-color:rgba(139,92,246,.4);}
.tbl-card.awaiting{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.04);}
.tbl-card.cleaning{border-color:rgba(59,130,246,.35);}
.tbl-num{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;}
.tbl-info{font-size:10px;color:var(--text2);margin-top:4px;}
.tbl-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;}
.tbl-dot.free{background:var(--green);}
.tbl-dot.occupied{background:var(--accent);}
.tbl-dot.reserved{background:var(--purple);}
.tbl-dot.awaiting{background:var(--yellow);}
.tbl-dot.cleaning{background:var(--blue);}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;}
.bg-green{background:rgba(0,217,126,.12);color:var(--green);border:1px solid rgba(0,217,126,.2);}
.bg-red{background:rgba(244,63,94,.12);color:var(--red);border:1px solid rgba(244,63,94,.2);}
.bg-yellow{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.2);}
.bg-blue{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.2);}
.bg-orange{background:rgba(245,166,35,.12);color:var(--accent);border:1px solid rgba(245,166,35,.2);}
.bg-purple{background:rgba(139,92,246,.12);color:var(--purple);border:1px solid rgba(139,92,246,.2);}
.bg-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--border);}

/* BUTTONS */
.btn{border:none;border-radius:var(--r-sm);padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .12s;font-family:'Outfit',sans-serif;display:inline-flex;align-items:center;gap:5px;}
.btn-p{background:var(--accent);color:#0e0f14;}
.btn-p:hover{background:var(--accent2);}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-g:hover{background:var(--bg4);color:var(--text);}
.btn-green{background:rgba(0,217,126,.12);color:var(--green);border:1px solid rgba(0,217,126,.2);}
.btn-red{background:rgba(244,63,94,.1);color:var(--red);border:1px solid rgba(244,63,94,.2);}
.btn-blue{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2);}
.btn-sm{padding:5px 10px;font-size:11.5px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.btn-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* INPUTS */
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);color:var(--text);padding:9px 12px;font-size:13px;font-family:'Outfit',sans-serif;width:100%;outline:none;transition:border .12s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--bg2);}
textarea{resize:vertical;min-height:70px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* HTML TABLES */
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:9px 12px;border-bottom:1px solid var(--border);}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12.5px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.015);}
.tbl-empty{text-align:center;color:var(--text3);padding:32px;font-size:13px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:24px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}
.modal-lg{max-width:840px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:14px;}
.modal-close:hover{color:var(--text);}
.hidden{display:none!important;}

/* TABS */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{padding:9px 14px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ORDER BUILDER */
.order-layout{display:flex;gap:14px;height:calc(100vh - 52px - 88px);}
.order-menu{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.order-cart{width:310px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;flex-shrink:0;}
.cart-header{padding:14px 16px;border-bottom:1px solid var(--border);}
.cart-items{flex:1;overflow-y:auto;padding:10px;}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:var(--r-sm);margin-bottom:7px;}
.cart-item-name{flex:1;font-size:12.5px;font-weight:500;}
.qty-ctrl{display:flex;align-items:center;gap:5px;}
.qty-btn{width:22px;height:22px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;cursor:pointer;color:var(--text);font-size:13px;display:flex;align-items:center;justify-content:center;}
.cart-footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.total-row{display:flex;justify-content:space-between;font-size:12.5px;color:var(--text2);}
.total-row.grand{font-size:15px;font-weight:700;color:var(--text);}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.mi-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px;cursor:pointer;transition:all .12s;}
.mi-card:hover{border-color:var(--accent);background:rgba(245,166,35,.05);}
.mi-name{font-size:12.5px;font-weight:600;}
.mi-price{font-size:12px;color:var(--green);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.mi-cat{font-size:10px;color:var(--text3);margin-top:2px;}

/* TICKETS */
.ticket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}
.ticket{background:var(--bg2);border:2px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:9px;}
.ticket.has-new{border-color:var(--accent);}
.ticket-h{display:flex;align-items:center;justify-content:space-between;}
.ticket-tbl{font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace;}
.ticket-time{font-size:10px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.t-item{display:flex;align-items:center;gap:7px;padding:7px;background:var(--bg3);border-radius:var(--r-sm);}
.t-item-name{flex:1;font-size:12.5px;}
.t-note{font-size:10px;color:var(--text2);font-style:italic;}
.st-btn{font-size:10px;padding:3px 7px;border-radius:99px;border:none;cursor:pointer;font-weight:700;transition:all .12s;text-transform:capitalize;}
.st-new{background:rgba(245,166,35,.2);color:var(--accent);}
.st-accepted{background:rgba(59,130,246,.2);color:var(--blue);}
.st-preparing{background:rgba(251,191,36,.2);color:var(--yellow);}
.st-ready{background:rgba(0,217,126,.2);color:var(--green);}
.st-completed{background:var(--bg4);color:var(--text3);}

/* INVOICE */
.inv-preview{background:#fff;color:#111;padding:28px;border-radius:var(--r);font-size:13px;}
.inv-preview h2{font-size:22px;font-weight:800;}
.inv-meta{font-size:11px;color:#666;margin-top:2px;}
.inv-table{width:100%;border-collapse:collapse;margin:14px 0;}
.inv-table th{font-size:10px;color:#888;padding:5px 0;border-bottom:1px solid #eee;text-align:left;}
.inv-table td{padding:7px 0;border-bottom:1px solid #f5f5f5;}
.inv-totals{border-top:2px solid #111;padding-top:10px;}
.inv-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12.5px;}
.inv-grand{font-size:17px;font-weight:800;padding-top:7px;border-top:1px solid #ddd;margin-top:5px;}

/* BAR CHART */
.bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;}
.bar-lbl{font-size:11px;color:var(--text2);width:65px;flex-shrink:0;}
.bar-wrap{flex:1;background:var(--bg4);border-radius:99px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .6s;}
.bar-val{font-size:11px;font-family:'JetBrains Mono',monospace;width:75px;text-align:right;}

/* SHIFT */
.shift-wrap{overflow-x:auto;}
.shift-table{border-collapse:collapse;width:100%;min-width:640px;}
.shift-table th{background:var(--bg3);font-size:10px;color:var(--text2);font-weight:700;padding:8px;border:1px solid var(--border);text-align:center;text-transform:uppercase;}
.shift-table td{background:var(--bg2);padding:5px 6px;border:1px solid var(--border);vertical-align:top;min-height:40px;}
.shift-block{background:rgba(245,166,35,.13);border:1px solid rgba(245,166,35,.3);border-radius:4px;padding:2px 6px;font-size:10px;color:var(--accent);margin:2px;display:inline-block;}

/* NOTIFY */
.notif{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 16px;z-index:9999;display:flex;align-items:center;gap:10px;font-size:12.5px;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:translateY(80px);opacity:0;transition:all .3s;max-width:340px;}
.notif.show{transform:translateY(0);opacity:1;}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:5px 12px;font-size:11.5px;cursor:pointer;color:var(--text2);transition:all .12s;}
.chip.active{background:rgba(245,166,35,.15);border-color:var(--accent);color:var(--accent);}

/* OCR */
.ocr-drop{border:2px dashed var(--border2);border-radius:var(--r);padding:36px;text-align:center;cursor:pointer;transition:all .15s;}
.ocr-drop:hover{border-color:var(--accent);}

/* PAYROLL ROW */
.pr-row{display:flex;align-items:center;justify-content:space-between;padding:11px;background:var(--bg3);border-radius:var(--r-sm);margin-bottom:7px;}
.pr-amounts{display:flex;gap:16px;font-size:12px;font-family:'JetBrains Mono',monospace;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
</style>
</head>
<body>

<!-- NOTIFY -->
<div class="notif" id="notif"><span id="notif-text"></span></div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModalOuter(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">RESTO <span>PRO</span></div>
    <div class="login-sub">Restaurant Management · v3.0</div>
    <div class="lf"><label id="lbl-user">Username / Email</label><input id="li-user" autocomplete="username"/></div>
    <div class="lf"><label id="lbl-pass">Password</label>
      <div class="pw-wrap"><input id="li-pass" type="password" autocomplete="current-password"/>
        <button class="pw-eye" onclick="togglePw('li-pass',this)">👁</button>
      </div>
    </div>
    <div class="lf"><label>Language</label>
      <select id="li-lang" onchange="applyLang(this.value,false)">

function applyLang(l, inApp) {
  lang = l;

  ['li-lang','app-lang'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=l; });

}

// DB — localStorage persistence layer
// ══════════════════════════════════════════════════════
const DB = {
  KEY: 'resto_v3_',
  get(k, def=null){ try{ const v=localStorage.getItem(this.KEY+k); return v!==null?JSON.parse(v):def; }catch(e){ return def; } },
  set(k,v){ try{ localStorage.setItem(this.KEY+k, JSON.stringify(v)); }catch(e){ notify('⚠️ Storage full!'); } },
  del(k){ localStorage.removeItem(this.KEY+k); },
  // helpers
  getUsers(){ return this.get('users', []); },
  setUsers(u){ this.set('users',u); },
  getTables(){ return this.get('tables',[]); },
  setTables(t){ this.set('tables',t); },
  getMenu(){ return this.get('menu',[]); },
  setMenu(m){ this.set('menu',m); },
  getOrders(){ return this.get('orders',[]); },
  setOrders(o){ this.set('orders',o); },
  getInvoices(){ return this.get('invoices',[]); },
  setInvoices(i){ this.set('invoices',i); },
  getEmployees(){ return this.get('employees',[]); },

  setExpenses(e){ this.set('expenses',e); },
  getPurchases(){ return this.get('purchases',[]); },

  nextId(k){ const n=(this.get('seq_'+k,1000)); this.set('seq_'+k,n+1); return n+1; },
};

function renderCredsList() {
  const list = document.getElementById('creds-list');
  if(!list) return;
  const users = DB.getUsers();
  if(!users.length){ list.innerHTML=`<div style="color:var(--text3);font-size:12px;padding:12px;">No accounts yet.</div>`; return; }
  list.innerHTML = users.map(u=>`
    <div class="cred-row" onclick="fillCreds('${u.email}','${u.pass}')">
      <div>
        <div class="cred-role" style="color:${u.color||'var(--accent)'};">${roleIcon(u.role)} ${u.name}</div>
        <div class="cred-info">${u.email}</div>
      </div>
      <div class="cred-pw">${u.pass}</div>
    </div>`).join('');
}
function roleIcon(r){ return {owner:'👑',manager:'📋',waiter:'🛎️',chef:'👨‍🍳',bar:'🍸'}[r]||'👤'; }
function fillCreds(u,p){ document.getElementById('li-user').value=u; document.getElementById('li-pass').value=p; }
function togglePw(id,btn){ const el=document.getElementById(id); el.type=el.type==='password'?'text':'password'; btn.textContent=el.type==='password'?'👁':'🙈'; }

function doLogin() {
  const email = document.getElementById('li-user').value.trim().toLowerCase();
  const pass  = document.getElementById('li-pass').value.trim();
  const users = DB.getUsers();
  const user  = users.find(u=>u.email===email && u.pass===pass && u.active!==false);
  if(!user){ document.getElementById('login-err').style.display='block'; return; }
  document.getElementById('login-err').style.display='none';
  currentUser = user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sb-avatar').textContent = user.name[0].toUpperCase();
  document.getElementById('sb-avatar').style.background = user.color||'var(--accent)';
  document.getElementById('sb-uname').textContent = user.name;
  document.getElementById('sb-urole').textContent = user.role.charAt(0).toUpperCase()+user.role.slice(1);
  buildNav();
  startClock();
  requestAnimationFrame(()=> navigate(ROLE_NAV[user.role][0]));
}

function logout() {
  currentUser = null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  renderCredsList();
}

// ══════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════
function buildNav() {
  if(!currentUser) return;
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '';
  const allowed = ROLE_NAV[currentUser.role]||[];
  let lastSec = '';
  const invs = DB.getInvoices();
  const kitNew = countNew('kitchen');
  const barNew = countNew('bar');
  NAV_ITEMS.forEach(item=>{
    if(!allowed.includes(item.id)) return;
    if(item.sec !== lastSec){
      const s=document.createElement('div'); s.className='sb-section'; s.textContent=t(item.sec); nav.appendChild(s); lastSec=item.sec;
    }
    const el=document.createElement('div');
    el.className='sb-item'; el.dataset.page=item.id;
    let badge='';
    if(item.badge==='kit' && kitNew) badge=`<span class="sb-badge">${kitNew}</span>`;
    if(item.badge==='bar' && barNew) badge=`<span class="sb-badge">${barNew}</span>`;
    if(item.badge==='inv' && invs.length) badge=`<span class="sb-badge">${invs.length}</span>`;
    el.innerHTML=`<span class="si">${item.icon}</span>${t(item.tk)}${badge}`;
    el.onclick=()=>navigate(item.id);
    nav.appendChild(el);
  });
}

function navigate(page) {
  if(!currentUser) return;
  const allowed = ROLE_NAV[currentUser.role]||[];
  if(!allowed.includes(page)) return;
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(n=>n.classList.toggle('active', n.dataset.page===page));
  document.getElementById('tb-title').textContent = t(page);
  renderPage(page);
}

function startClock() {
  const tick=()=>{ const el=document.getElementById('clock'); if(el) el.textContent=new Date().toLocaleTimeString('en-GB'); };
  tick(); setInterval(tick,1000);
}

const STATUSES = ['new','accepted','preparing','ready','completed'];
function countNew(station){ let n=0; DB.getOrders().forEach(o=>{ if(o.status==='active') o.items.forEach(i=>{ if(i.station===station&&i.status==='new') n++; }); }); return n; }
function countSt(station,st){ let n=0; DB.getOrders().forEach(o=>o.items.forEach(i=>{ if(i.station===station&&i.status===st) n++; })); return n; }

function saveTableStatus(id){

function deleteTable(id){

function startOrderForTable(tableId){ cartTableId=tableId; cartItems=[]; closeModal(); renderOrderBuilder(); }
function renderOrderBuilder(){

function renderMenuItems(){
  const g=document.getElementById('menu-grid'); if(!g) return;
  const menu=DB.getMenu();
  const items=menu.filter(m=>(menuCatFilter==='All'||m.cat===menuCatFilter)&&(!menuSearchQ||m.name.toLowerCase().includes(menuSearchQ.toLowerCase())));
  g.innerHTML=items.map(m=>`<div class="mi-card" onclick="addToCart(${m.id})"><div class="mi-name">${m.name}</div><div class="mi-price">€${parseFloat(m.price).toFixed(2)}</div><div class="mi-cat">${m.cat} · <span style="color:${m.station==='kitchen'?'var(--accent)':'var(--blue)'}">● ${m.station}</span></div></div>`).join('');
}
function addToCart(menuId){
  const menu=DB.getMenu(); const m=menu.find(x=>x.id===menuId); if(!m) return;
  const ex=cartItems.find(x=>x.menuId===menuId);
  if(ex) ex.qty++; else cartItems.push({menuId,name:m.name,qty:1,station:m.station,status:'new',note:'',price:parseFloat(m.price),vat:parseInt(m.vat)||10});
  renderCart();
}
function renderCart(){
  const el=document.getElementById('cart-list'); if(!el) return;
  if(!cartItems.length){ el.innerHTML=`<div style="color:var(--text3);font-size:12px;text-align:center;padding:30px;">Add items from menu</div>`; calcTotals(); return; }
  el.innerHTML=cartItems.map((item,i)=>`<div class="cart-item"><span style="font-size:12px;color:${item.station==='kitchen'?'var(--accent)':'var(--blue)'};">${item.station==='kitchen'?'🔥':'🍸'}</span><div style="flex:1;"><div class="cart-item-name">${item.name}</div><div style="font-size:10px;color:var(--text2);">€${item.price.toFixed(2)}/ea</div></div><div class="qty-ctrl"><div class="qty-btn" onclick="cartQty(${i},-1)">−</div><span style="font-size:12px;font-weight:700;min-width:14px;text-align:center;">${item.qty}</span><div class="qty-btn" onclick="cartQty(${i},1)">+</div></div><div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--green);min-width:46px;text-align:right;">€${(item.price*item.qty).toFixed(2)}</div></div>`).join('');
  calcTotals();
}
function cartQty(i,d){ cartItems[i].qty+=d; if(cartItems[i].qty<=0) cartItems.splice(i,1); renderCart(); }
function calcTotals(){
  const sub=cartItems.reduce((s,i)=>s+(i.price*i.qty),0);
  const vat=cartItems.reduce((s,i)=>s+(i.price*i.qty*(i.vat/100)),0);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('ct-sub',`€${sub.toFixed(2)}`); set('ct-vat',`€${vat.toFixed(2)}`); set('ct-total',`€${(sub+vat).toFixed(2)}`);
}
function sendOrder(tableId){
  if(!cartItems.length){ notify('⚠️ Add items first!'); return; }
  const orders=DB.getOrders(); const tables=DB.getTables();
  const tb=tables.find(x=>x.id===tableId); if(!tb) return;
  const sub=cartItems.reduce((s,i)=>s+(i.price*i.qty),0);
  const vat=cartItems.reduce((s,i)=>s+(i.price*i.qty*(i.vat/100)),0);
  const oid=DB.nextId('order');
  const order={id:oid,tableId,status:'active',items:cartItems.map(x=>({...x})),created:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),by:currentUser.name,total:parseFloat((sub+vat).toFixed(2))};
  orders.push(order); DB.setOrders(orders);
  if(!tb.orders) tb.orders=[];
  tb.orders.push(oid); tb.status='occupied'; DB.setTables(tables);
  cartItems=[];
  notify(`✅ Order #${oid} sent! 🔥${order.items.filter(i=>i.station==='kitchen').length} 🍸${order.items.filter(i=>i.station==='bar').length}`);
  buildNav(); navigate('orders');
}
function viewOrderModal(id){

    ${o.status!=='completed'?`<button class="btn btn-green" style="width:100%;margin-top:12px;" onclick="goToInvoiceForOrder(${id})">🧾 Generate Invoice</button>`:''}
  `);

function itemBadge(s){ return {new:'bg-orange',accepted:'bg-blue',preparing:'bg-yellow',ready:'bg-green',completed:'bg-gray',cancelled:'bg-red'}[s]||'bg-gray'; }
function goToInvoiceForOrder(id){ closeModal(); navigate('createinvoice'); setTimeout(()=>{ const el=document.getElementById('ci-order'); if(el){ el.value=id; updateCIPreview(); } },80); }

function pgCreateInvoice(c){
  const orders=DB.getOrders().filter(o=>o.status!=='completed');
  const settings=DB.getSettings();
  c.innerHTML=`
  <div class="section-header"><div class="section-title">${t('createinvoice')}</div></div>
  <div class="g2">
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:14px;">Invoice Details</div>
      ${!orders.length?`<div class="tbl-empty">No active orders to invoice.</div>`:`
      <div class="fg2">
        <div class="field"><label>Order</label><select id="ci-order" onchange="updateCIPreview()">${orders.map(o=>`<option value="${o.id}">#${o.id} — ${(DB.getTables().find(x=>x.id===o.tableId)||{}).num||'?'} (€${o.total.toFixed(2)})</option>`).join('')}</select></div>
        <div class="field"><label>Type</label><select id="ci-type"><option>Table</option><option>Takeaway</option><option>Delivery</option></select></div>
        <div class="field"><label>Payment Method</label><select id="ci-pay"><option>Cash</option><option>Card</option><option>Credit Card</option><option>PayPal</option><option>Mixed</option></select></div>
        <div class="field"><label>Discount %</label><input id="ci-disc" type="number" value="0" min="0" max="100" oninput="updateCIPreview()"/></div>
        <div class="field"><label>Service Charge %</label><input id="ci-svc" type="number" value="${settings.service_charge||0}" min="0" oninput="updateCIPreview()"/></div>
        <div class="field"><label>Notes</label><input id="ci-notes" placeholder="Optional..."/></div>
      </div>
      <button class="btn btn-p" style="margin-top:14px;width:100%;" onclick="doCreateInvoice()">✅ Generate & Save Invoice</button>`}
    </div>
    <div class="inv-preview" id="ci-preview">
      <div style="display:flex;justify-content:space-between;margin-bottom:16px;">
        <div><h2>${settings.name||'RESTO'}</h2><div class="inv-meta">${settings.address||''}</div><div class="inv-meta">VAT: ${settings.vat_no||'—'}</div></div>
        <div style="text-align:right;"><div style="font-size:14px;font-weight:800;">${settings.invoice_prefix||'INV-'}${DB.getInvoices().length+1}</div><div class="inv-meta">${new Date().toLocaleDateString('en-GB')}</div></div>
      </div>
      <div id="ci-rows-wrap"><div style="color:#999;text-align:center;padding:16px;">Select an order above</div></div>
    </div>
  </div>`;
  if(orders.length) updateCIPreview();
}
function updateCIPreview(){
  const selEl=document.getElementById('ci-order'); if(!selEl) return;
  const o=DB.getOrders().find(x=>x.id===parseInt(selEl.value)); if(!o) return;
  const disc=parseFloat(document.getElementById('ci-disc')?.value||0)/100;
  const svc=parseFloat(document.getElementById('ci-svc')?.value||0)/100;
  const sub=o.items.reduce((s,i)=>s+(i.price*i.qty),0);
  const discAmt=sub*disc; const subAfterDisc=sub-discAmt;
  const svcAmt=subAfterDisc*svc;
  const vat=o.items.reduce((s,i)=>s+(i.price*i.qty*(i.vat/100)),0);
  const total=subAfterDisc+svcAmt+vat;
  const wrap=document.getElementById('ci-rows-wrap'); if(!wrap) return;
  wrap.innerHTML=`<table class="inv-table"><thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>${o.items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>€${i.price.toFixed(2)}</td><td>€${(i.price*i.qty).toFixed(2)}</td></tr>`).join('')}</tbody></table><div class="inv-totals">${disc?`<div class="inv-row"><span>Subtotal</span><span>€${sub.toFixed(2)}</span></div><div class="inv-row" style="color:#e53;"><span>Discount (${(disc*100).toFixed(0)}%)</span><span>-€${discAmt.toFixed(2)}</span></div>`:''}<div class="inv-row"><span>Net</span><span>€${subAfterDisc.toFixed(2)}</span></div>${svc?`<div class="inv-row"><span>Service (${(svc*100).toFixed(0)}%)</span><span>€${svcAmt.toFixed(2)}</span></div>`:''}<div class="inv-row"><span>VAT</span><span>€${vat.toFixed(2)}</span></div><div class="inv-row inv-grand"><span>TOTAL</span><span>€${total.toFixed(2)}</span></div></div>`;
}
function doCreateInvoice(){
  const selEl=document.getElementById('ci-order'); if(!selEl) return;
  const orders=DB.getOrders(); const tables=DB.getTables(); const settings=DB.getSettings();
  const o=orders.find(x=>x.id===parseInt(selEl.value)); if(!o) return;
  const tb=tables.find(x=>x.id===o.tableId);
  const disc=parseFloat(document.getElementById('ci-disc')?.value||0)/100;
  const svc=parseFloat(document.getElementById('ci-svc')?.value||0)/100;
  const sub=o.items.reduce((s,i)=>s+(i.price*i.qty),0);
  const subAfterDisc=sub*(1-disc); const svcAmt=subAfterDisc*svc;
  const vat=o.items.reduce((s,i)=>s+(i.price*i.qty*(i.vat/100)),0);
  const total=parseFloat((subAfterDisc+svcAmt+vat).toFixed(2));
  const invs=DB.getInvoices();
  const invId=`${settings.invoice_prefix||'INV-'}${String(DB.nextId('invoice')).padStart(4,'0')}`;
  const inv={id:invId,date:new Date().toLocaleDateString('en-GB'),time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),orderId:o.id,table:tb?tb.num:'—',type:document.getElementById('ci-type').value,payment:document.getElementById('ci-pay').value,net:parseFloat(subAfterDisc.toFixed(2)),vat:parseFloat(vat.toFixed(2)),total,discount:parseFloat((sub*disc).toFixed(2)),service:parseFloat(svcAmt.toFixed(2)),notes:document.getElementById('ci-notes')?.value||'',by:currentUser.name,status:'paid',items:o.items};
  invs.unshift(inv); DB.setInvoices(invs);
  o.status='completed'; DB.setOrders(orders);
  if(tb){ tb.status='free'; tb.orders=(tb.orders||[]).filter(x=>x!==o.id); DB.setTables(tables); }
  notify(`✅ Invoice ${invId} saved!`); buildNav(); navigate('invoices');
}

let invFilter='all';
function setInvFilter(f,el){ invFilter=f; document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); renderInvTable(); }
function renderInvTable(){
  const tbody=document.getElementById('inv-tbody'); if(!tbody) return;
  const q=(document.getElementById('inv-search')?.value||'').toLowerCase();
  const today=new Date().toLocaleDateString('en-GB');
  const allInvs=DB.getInvoices();
  let rows=allInvs.filter(inv=>{
    if(q && !inv.id.toLowerCase().includes(q) && !inv.table.toLowerCase().includes(q) && !(inv.payment||'').toLowerCase().includes(q)) return false;
    if(invFilter==='today') return inv.date===today;
    return true;
  });
  const cnt=document.getElementById('inv-count'); if(cnt) cnt.textContent=`${rows.length} entries`;
  tbody.innerHTML=rows.length?rows.map(inv=>`<tr><td class="mono">${inv.id}</td><td style="font-size:11px;">${inv.date}</td><td class="mono" style="font-size:11px;">${inv.time||'—'}</td><td>${inv.table}</td><td>${inv.type}</td><td>${inv.payment}</td><td class="mono">€${inv.net.toFixed(2)}</td><td class="mono">€${inv.vat.toFixed(2)}</td><td class="mono" style="font-weight:700;">€${inv.total.toFixed(2)}</td><td><span class="badge bg-green">${t('paid')}</span></td><td><div class="btn-row"><button class="btn btn-xs btn-g" onclick="viewInvoice('${inv.id}')">View</button><button class="btn btn-xs btn-red" onclick="deleteInvoice('${inv.id}')">Delete</button></div></td></tr>`).join(''):`<tr><td colspan="11" class="tbl-empty">${t('no-data')}</td></tr>`;
}
function viewInvoice(id){
  const inv=DB.getInvoices().find(x=>x.id===id); if(!inv) return;
  const settings=DB.getSettings();
  showModal(`Invoice ${inv.id}`,`
    <div class="inv-preview">
      <div style="display:flex;justify-content:space-between;margin-bottom:16px;">
        <div><h2>${settings.name||'RESTO'}</h2><div class="inv-meta">${settings.address||''}</div><div class="inv-meta">VAT: ${settings.vat_no||'—'}</div></div>
        <div style="text-align:right;"><div style="font-size:14px;font-weight:800;">${inv.id}</div><div class="inv-meta">${inv.date} ${inv.time||''}</div><div class="inv-meta">${inv.table} · ${inv.type}</div></div>
      </div>
      ${inv.items?`<table class="inv-table"><thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>${inv.items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>€${i.price.toFixed(2)}</td><td>€${(i.price*i.qty).toFixed(2)}</td></tr>`).join('')}</tbody></table>`:''}
      <div class="inv-totals">
        ${inv.discount?`<div class="inv-row" style="color:#e53;"><span>Discount</span><span>-€${inv.discount.toFixed(2)}</span></div>`:''}
        <div class="inv-row"><span>Net</span><span>€${inv.net.toFixed(2)}</span></div>
        ${inv.service?`<div class="inv-row"><span>Service</span><span>€${inv.service.toFixed(2)}</span></div>`:''}
        <div class="inv-row"><span>VAT</span><span>€${inv.vat.toFixed(2)}</span></div>
        <div class="inv-row inv-grand"><span>TOTAL</span><span>€${inv.total.toFixed(2)}</span></div>
        <div class="inv-row" style="color:#888;font-size:11px;">${inv.payment} · ${inv.by} ${inv.notes?'· '+inv.notes:''}</div>
        <div class="inv-row" style="color:#888;font-size:11px;margin-top:4px;">${settings.footer||''}</div>
      </div>
    </div>
    <button class="btn btn-g" style="width:100%;margin-top:12px;" onclick="window.print()">🖨️ Print</button>
  `);
}
function deleteInvoice(id){
  if(!confirm('Delete this invoice permanently?')) return;
  DB.setInvoices(DB.getInvoices().filter(x=>x.id!==id));
  notify('🗑️ Invoice deleted'); buildNav(); renderInvTable();
}

function runOCR(input){

  }; r.readAsDataURL(file);
  setTimeout(()=>{
    document.getElementById('ocr-result').innerHTML=`

      <div class="field"><label>Total (€)</label><input id="ocr-total" type="number" value="0.00"/></div>
      <div class="field"><label>Notes</label><input id="ocr-notes" placeholder="Optional..."/></div>
    </div>
    <div class="btn-row" style="margin-top:14px;">
      <button class="btn btn-p btn-sm" onclick="saveOCRasPurchase()">📦 Save as Purchase</button>
      <button class="btn btn-g btn-sm" onclick="saveOCRasExpense()">💸 Save as Expense</button>
    </div>`;
  },1600);
}
function saveOCRasPurchase(){
  const purchases=DB.getPurchases();
  purchases.unshift({id:DB.nextId('purchase'),supplier:document.getElementById('ocr-supplier')?.value,invNo:document.getElementById('ocr-invno')?.value,date:document.getElementById('ocr-date')?.value,total:parseFloat(document.getElementById('ocr-total')?.value||0),vat:parseFloat(document.getElementById('ocr-vat')?.value||0),notes:document.getElementById('ocr-notes')?.value,by:currentUser.name});

      ${items.map((item,idx)=>`<div class="t-item"><div style="flex:1;"><div class="t-item-name">×${item.qty} ${item.name}</div>${item.note?`<div class="t-note">${item.note}</div>`:''}</div><button class="st-btn st-${item.status}" onclick="cycleItemStatus('bar',${o.id},${idx})">${item.status}</button></div>`).join('')}

  }).join(''):`<div class="card" style="grid-column:1/-1;text-align:center;padding:50px;color:var(--text3);">✅ No pending bar orders</div>`}</div>`;
}
function cycleItemStatus(station,orderId,itemIdx){
  const orders=DB.getOrders(); const o=orders.find(x=>x.id===orderId); if(!o) return;
  const items=o.items.filter(i=>i.station===station);
  if(!items[itemIdx]) return;
  const ci=STATUSES.indexOf(items[itemIdx].status);
  items[itemIdx].status=STATUSES[Math.min(ci+1,STATUSES.length-1)];
  // update in full items array
  let sIdx=0;
  o.items.forEach((item,i)=>{ if(item.station===station){ if(sIdx===itemIdx) o.items[i].status=items[itemIdx].status; sIdx++; } });
  DB.setOrders(orders); notify(`${items[itemIdx].name} → ${items[itemIdx].status}`);
  buildNav(); renderPage(station==='kitchen'?'kitchen':'bar');
}
function markAllReady(station,orderId){
  const orders=DB.getOrders(); const o=orders.find(x=>x.id===orderId); if(!o) return;
  o.items.filter(i=>i.station===station&&i.status!=='completed').forEach(i=>i.status='ready');
  DB.setOrders(orders); notify('✅ All marked Ready!'); buildNav(); renderPage(station==='kitchen'?'kitchen':'bar');
}

// ══════════════════════════════════════════════════════
function pgProfit(c){
  const invs=DB.getInvoices(); const emps=DB.getEmployees().filter(e=>e.status==='active');
  const rev=invs.reduce((s,i)=>s+i.total,0);
  const expenses=DB.getExpenses().reduce((s,e)=>s+parseFloat(e.amount||0),0);
  const salaries=emps.reduce((s,e)=>s+parseFloat(e.salary||0),0);
  const purchases=DB.getPurchases().reduce((s,p)=>s+parseFloat(p.total||0),0);
  const net=rev-expenses-salaries-purchases;
  c.innerHTML=`
  <div class="section-header"><div class="section-title">${t('profit')}</div></div>
  <div class="g2">
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:14px;">P&amp;L Overview</div>
      ${[['Revenue',rev,'var(--green)'],['Salaries',-salaries,'var(--red)'],['Expenses',-expenses,'var(--red)'],['Purchases',-purchases,'var(--red)'],['Net Profit',net,net>=0?'var(--green)':'var(--red)']].map(([l,v,col])=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:12.5px;"><span style="color:var(--text2);">${l}</span><strong style="color:${col};font-family:'JetBrains Mono',monospace;">${v<0?'-':''}€${Math.abs(v).toFixed(2)}</strong></div>`).join('')}
      <div style="margin-top:14px;padding:14px;background:rgba(0,217,126,.07);border:1px solid rgba(0,217,126,.2);border-radius:var(--r);text-align:center;">
        <div style="font-size:11px;color:var(--text2);">Profit Margin</div>
        <div style="font-size:30px;font-weight:800;color:${net>=0?'var(--green)':'var(--red)'};">${rev>0?Math.round((net/rev)*100):0}%</div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;margin-bottom:14px;">Revenue by Day (last 7 days)</div>
      ${getLast7Days().map(({label,total})=>`<div class="bar-row"><div class="bar-lbl">${label}</div><div class="bar-wrap"><div class="bar-fill" style="width:${rev>0?Math.round(total/rev*100*7):0}%;background:var(--accent)"></div></div><div class="bar-val">€${total.toFixed(0)}</div></div>`).join('')}
    </div>
  </div>`;
}
function getLast7Days(){
  const invs=DB.getInvoices(); const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const label=d.toLocaleDateString('en-GB',{weekday:'short'});
    const dateStr=d.toLocaleDateString('en-GB');
    const total=invs.filter(inv=>inv.date===dateStr).reduce((s,inv)=>s+inv.total,0);
    days.push({label,total});
  }
  return days;
}

function pgVAT(c){
  const invs=DB.getInvoices();
  const salesVat=invs.reduce((s,i)=>s+i.vat,0);
  const purchases=DB.getPurchases();
  const purchVat=purchases.reduce((s,p)=>s+(parseFloat(p.total||0)-parseFloat(p.total||0)/(1+parseFloat(p.vat||0)/100)),0);
  c.innerHTML=`
  <div class="section-header"><div class="section-title">${t('vat')}</div></div>
  <div class="stat-grid">
    <div class="stat-card c-green"><div class="stat-label">Sales VAT Collected</div><div class="stat-val" style="color:var(--green)">€${salesVat.toFixed(2)}</div><div class="stat-note">${invs.length} invoices</div></div>
    <div class="stat-card c-red"><div class="stat-label">Purchase VAT Paid</div><div class="stat-val" style="color:var(--red)">€${purchVat.toFixed(2)}</div><div class="stat-note">${purchases.length} purchases</div></div>
    <div class="stat-card c-yellow"><div class="stat-label">VAT Payable</div><div class="stat-val" style="color:var(--yellow)">€${(salesVat-purchVat).toFixed(2)}</div><div class="stat-note">Due to tax authority</div></div>
  </div>
  <div class="card" style="margin-top:14px;overflow-x:auto;">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px;">Invoice VAT Breakdown</div>
    <table><thead><tr><th>Invoice</th><th>Date</th><th>Net</th><th>VAT</th><th>Total</th></tr></thead>
    <tbody>${invs.length?invs.slice(0,20).map(i=>`<tr><td class="mono">${i.id}</td><td style="font-size:11px;">${i.date}</td><td class="mono">€${i.net.toFixed(2)}</td><td class="mono" style="color:var(--yellow);">€${i.vat.toFixed(2)}</td><td class="mono">€${i.total.toFixed(2)}</td></tr>`).join(''):`<tr><td colspan="5" class="tbl-empty">${t('no-data')}</td></tr>`}</tbody></table>
  </div>`;
}

function exportAll(){
  const data={tables:DB.getTables(),menu:DB.getMenu(),orders:DB.getOrders(),invoices:DB.getInvoices(),employees:DB.getEmployees(),expenses:DB.getExpenses(),purchases:DB.getPurchases(),shifts:DB.getShifts(),leaves:DB.getLeaves(),settings:DB.getSettings(),users:DB.getUsers(),exportedAt:new Date().toISOString()};
  downloadJSON(data,'resto_backup.json'); notify('✅ Backup exported!');
}
function exportCSV(key){
  const data=DB.get(key,[]);
  if(!data.length){ notify('No data to export'); return; }
  const keys=Object.keys(data[0]);
  const rows=[keys,...data.map(r=>keys.map(k=>r[k]))];
  downloadCSV(rows,`${key}.csv`); notify(`✅ ${key} exported!`);
}
function importBackup(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader(); r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.tables) DB.setTables(data.tables);
      if(data.menu) DB.setMenu(data.menu);
      if(data.orders) DB.setOrders(data.orders);
      if(data.invoices) DB.setInvoices(data.invoices);
      if(data.employees) DB.setEmployees(data.employees);
      if(data.expenses) DB.setExpenses(data.expenses);
      if(data.purchases) DB.setPurchases(data.purchases);
      if(data.shifts) DB.setShifts(data.shifts);
      if(data.leaves) DB.setLeaves(data.leaves);
      if(data.settings) DB.setSettings(data.settings);
      if(data.users) DB.setUsers(data.users);
      notify('✅ Backup restored!'); renderCredsList();
    }catch(err){ notify('❌ Invalid backup file'); }
  }; r.readAsText(file);
}
function clearAllData(){
  if(!confirm('This will delete ALL data permanently. Are you sure?')) return;
  if(!confirm('Last chance — this cannot be undone!')) return;
  ['tables','menu','orders','invoices','employees','expenses','purchases','shifts','leaves'].forEach(k=>DB.del(k));
  notify('🗑️ All data cleared'); navigate('dashboard');
}

function saveAccount(id){
  const name=document.getElementById('ac-name')?.value.trim();
  const email=document.getElementById('ac-email')?.value.trim().toLowerCase();
  const err=document.getElementById('ac-err');
  if(!name||!email){ if(err){err.textContent='Name and email required';err.style.display='block';} return; }
  const users=DB.getUsers();
  if(!id){
    const pass=document.getElementById('ac-pass')?.value;
    if(!pass||pass.length<6){ if(err){err.textContent='Password must be at least 6 characters';err.style.display='block';} return; }
    if(users.find(u=>u.email===email)){ if(err){err.textContent='Email already in use';err.style.display='block';} return; }
    users.push({id:DB.nextId('user'),name,email,pass,role:document.getElementById('ac-role')?.value||'waiter',color:document.getElementById('ac-color')?.value||'#f5a623',active:true});
  } else {
    const u=users.find(x=>x.id===id); if(!u) return;
    u.name=name; u.email=email; u.role=document.getElementById('ac-role')?.value||u.role;
    u.color=document.getElementById('ac-color')?.value||u.color;
    u.active=document.getElementById('ac-active')?.value!=='false';
  }
  DB.setUsers(users); closeModal(); notify('✅ Account saved!'); renderAccountsList(); renderCredsList();
}

function doChangePassword(id){
  const users=DB.getUsers(); const u=users.find(x=>x.id===id); if(!u) return;
  const oldP=document.getElementById('cp-old')?.value;
  const newP=document.getElementById('cp-new')?.value;
  const confP=document.getElementById('cp-conf')?.value;
  const err=document.getElementById('cp-err');
  const setErr=(msg)=>{ if(err){err.textContent=msg;err.style.display='block';} };
  if(oldP!==u.pass){ setErr('Current password is incorrect'); return; }
  if(newP.length<6){ setErr('New password must be at least 6 characters'); return; }
  if(newP!==confP){ setErr('Passwords do not match'); return; }
  u.pass=newP; DB.setUsers(users);
  if(currentUser.id===id) currentUser.pass=newP;
  closeModal(); notify('✅ Password changed successfully!'); renderCredsList();
}

function downloadJSON(data,filename){
  const a=document.createElement('a'); a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2)); a.download=filename; a.click();

function downloadCSV(rows,filename){
  const csv=rows.map(r=>r.map(v=>typeof v==='string'&&v.includes(',')?`"${v}"`:v).join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download=filename; a.click();
}

// ══════════════════════════════════════════════════════
const API_BASE = window.location.origin;
let SERVER_TOKEN = localStorage.getItem('resto_token') || '';
let SERVER_CACHE = {};
let SERVER_SOCKET = null;

async function apiFetch(path, options={}) {
  const headers = options.headers || {};
  if (!(options.body instanceof FormData)) headers['Content-Type'] = headers['Content-Type'] || 'application/json';
  if (SERVER_TOKEN) headers.Authorization = `Bearer ${SERVER_TOKEN}`;
  const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
  if (!res.ok) throw new Error((await res.json().catch(()=>({error:res.statusText}))).error || res.statusText);
  return res.json();
}

function patchDBForServer() {
  DB.get = function(k, def=null){ return Object.prototype.hasOwnProperty.call(SERVER_CACHE,k) ? SERVER_CACHE[k] : def; };
  DB.set = function(k,v){
    SERVER_CACHE[k] = v;
    if (SERVER_TOKEN) apiFetch(`/api/state/${encodeURIComponent(k)}`, { method:'POST', body:JSON.stringify({value:v}) }).catch(err=>notify(`⚠️ Server save failed: ${err.message}`));
  };
  DB.del = function(k){ SERVER_CACHE[k] = Array.isArray(SERVER_CACHE[k]) ? [] : null; if(SERVER_TOKEN) apiFetch(`/api/state/${encodeURIComponent(k)}`, { method:'POST', body:JSON.stringify({value:SERVER_CACHE[k]}) }).catch(()=>{}); };
  DB.nextId = function(k){ return Math.floor(Date.now() + Math.random()*1000); };
}

async function initServerMode() {
  try {
    patchDBForServer();
    const bootData = await apiFetch('/api/bootstrap');
    SERVER_CACHE = bootData.state || {};
    lang = SERVER_CACHE.lang || 'en';
    applyLang(lang, false);
    renderCredsList();
    connectLiveSync();
    const footer = document.querySelector('.sb-status');
    if (footer) footer.innerHTML = 'Server database active<br>Data: central backend';
  } catch (err) {
    alert('Backend connection failed. Start the Node.js server first. Error: ' + err.message);
  }
}

function connectLiveSync() {
  if (SERVER_SOCKET) return;
  const script = document.createElement('script');
  script.src = '/socket.io/socket.io.js';
  script.onload = () => {
    SERVER_SOCKET = io();
    SERVER_SOCKET.on('state:update', msg => {
      SERVER_CACHE[msg.key] = msg.value;
      if (!currentUser) { renderCredsList(); return; }
      buildNav();
      if (!document.getElementById('modal-overlay')?.classList.contains('hidden')) return;
      renderPage(currentPage);
    });
  };
  document.head.appendChild(script);
}

renderCredsList = function() {

  if(!users.length){ list.innerHTML=`<div style="color:var(--text3);font-size:12px;padding:12px;">No accounts yet.</div>`; return; }

        <div class="cred-info">${u.email}</div>

doLogin = async function() {
  const email = document.getElementById('li-user').value.trim().toLowerCase();
  const pass  = document.getElementById('li-pass').value.trim();
  try {
    const out = await apiFetch('/api/login', { method:'POST', body: JSON.stringify({ email, password: pass }) });
    SERVER_TOKEN = out.token;
    localStorage.setItem('resto_token', SERVER_TOKEN);
    currentUser = out.user;
    document.getElementById('login-err').style.display='none';
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('sb-avatar').textContent = currentUser.name[0].toUpperCase();
    document.getElementById('sb-avatar').style.background = currentUser.color||'var(--accent)';
    document.getElementById('sb-uname').textContent = currentUser.name;
    document.getElementById('sb-urole').textContent = currentUser.role.charAt(0).toUpperCase()+currentUser.role.slice(1);
    const footer = document.querySelector('.sb-status');
    if (footer) footer.innerHTML = 'Server database active<br>Data: central backend';
    buildNav();
    startClock();
    requestAnimationFrame(()=> navigate(ROLE_NAV[currentUser.role][0]));
  } catch(err) {
    document.getElementById('login-err').textContent = '❌ ' + err.message;
    document.getElementById('login-err').style.display='block';
  }
};

logout = function() {
  SERVER_TOKEN = '';
  localStorage.removeItem('resto_token');
  currentUser = null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  renderCredsList();
};

runOCR = async function(input){
  const file=input.files[0]; if(!file) return;
  document.getElementById('ocr-result').innerHTML=`<div style="text-align:center;padding:40px;color:var(--text2);">⏳ Processing OCR on server...</div>`;
  const r=new FileReader(); r.onload=e=>{
    const pb=document.getElementById('ocr-preview-box');
    if(pb && file.type.startsWith('image/')) pb.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;">Preview</div><img src="${e.target.result}" style="max-width:100%;border-radius:4px;max-height:180px;object-fit:contain;"/>`;
    else if(pb) pb.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;">Preview</div><div style="font-size:12px;color:var(--text2);">${file.name}</div>`;
  }; r.readAsDataURL(file);
  const fd = new FormData(); fd.append('file', file);
  let fields = {supplier:'Supplier Name',invNo:'INV-0001',date:new Date().toISOString().split('T')[0],payment:'Cash',subtotal:0,vat:0,total:0,notes:''};
  let rawText = '';
  try {
    const out = await apiFetch('/api/ocr', { method:'POST', body: fd, headers: {} });
    fields = out.fields || fields;
    rawText = out.rawText || '';
  } catch(err) {
    notify('⚠️ OCR failed, enter fields manually.');
  }
  document.getElementById('ocr-result').innerHTML=`
    <div style="font-size:12px;font-weight:700;margin-bottom:12px;">✅ Extracted fields <span style="font-size:10px;color:var(--text3);">(editable)</span></div>
    <div class="fg2">
      <div class="field"><label>Supplier</label><input id="ocr-supplier" value="${fields.supplier||''}"/></div>
      <div class="field"><label>Invoice #</label><input id="ocr-invno" value="${fields.invNo||''}"/></div>
      <div class="field"><label>Date</label><input id="ocr-date" type="date" value="${fields.date||new Date().toISOString().split('T')[0]}"/></div>
      <div class="field"><label>Payment</label><input id="ocr-pay" value="${fields.payment||'Cash'}"/></div>
      <div class="field"><label>Subtotal (€)</label><input id="ocr-sub" type="number" value="${fields.subtotal||0}"/></div>
      <div class="field"><label>VAT (€)</label><input id="ocr-vat" type="number" value="${fields.vat||0}"/></div>
      <div class="field"><label>Total (€)</label><input id="ocr-total" type="number" value="${fields.total||0}"/></div>
      <div class="field"><label>Notes</label><input id="ocr-notes" value="${fields.notes||''}" placeholder="Optional..."/></div>
    </div>
    ${rawText?`<details style="margin-top:12px;"><summary style="font-size:12px;color:var(--text2);cursor:pointer;">Raw OCR text</summary><pre style="white-space:pre-wrap;font-size:11px;color:var(--text2);margin-top:8px;max-height:160px;overflow:auto;">${rawText.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}</pre></details>`:''}
    <div class="btn-row" style="margin-top:14px;">
      <button class="btn btn-p btn-sm" onclick="saveOCRasPurchase()">📦 Save as Purchase</button>
      <button class="btn btn-g btn-sm" onclick="saveOCRasExpense()">💸 Save as Expense</button>
    </div>`;
};

initServerMode();
</script>
